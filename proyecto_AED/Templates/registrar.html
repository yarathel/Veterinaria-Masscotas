<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Masscotas Veterinaria</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #e0f7fa; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .register-container { background: white; padding: 40px 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); width: 100%; max-width: 500px; text-align: center; }
        .logo { width: 80px; height: 80px; object-fit: contain; margin: 0 auto 20px; border-radius: 12px; background: #f5f9ff; padding: 8px; box-shadow: 0 4px 12px rgba(33, 150, 243, 0.15); }
        h2 { color: #0277bd; font-size: 1.8rem; margin-bottom: 24px; font-weight: 700; }
        .message { padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .error { background-color: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        .success { background-color: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        label { display: block; margin: 16px 0 8px; font-weight: 600; color: #34495e; text-align: left; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; transition: all 0.3s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #0288d1; box-shadow: 0 0 0 3px rgba(2, 136, 209, 0.2); }
        textarea { resize: vertical; min-height: 100px; }
        button { width: 100%; padding: 14px; background: #0288d1; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 16px; transition: all 0.3s; box-shadow: 0 4px 6px rgba(2, 136, 209, 0.2); display: flex; align-items: center; justify-content: center; gap: 8px; }
        button:hover { background: #0277bd; transform: translateY(-2px); box-shadow: 0 6px 8px rgba(2, 136, 209, 0.3); }
        .back-link { display: block; margin-top: 25px; color: #0288d1; text-decoration: none; font-weight: 600; transition: color 0.3s; }
        .back-link:hover { color: #01579b; text-decoration: underline; }
        .veterinario-fields {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .veterinario-fields.mostrar {
            display: block;
        }
        @media (max-width: 500px) { .register-container { padding: 30px 20px; } }
    </style>
</head>
<body>
    <div class="register-container">
        <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Logo" class="logo">
        <h2>Crear Cuenta</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="message {{ 'error' if category == 'error' else 'success' }}">
                        {% if category == 'error' %}<i class="fas fa-exclamation-circle"></i>{% else %}<i class="fas fa-check-circle"></i>{% endif %}
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" autocomplete="off">
            <label for="correo">Correo electrónico</label>
            <input type="email" id="correo" name="correo" required autocomplete="off" placeholder="ejemplo@correo.com">

            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" name="nombre" required autocomplete="off" placeholder="Juan Pérez">

            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required autocomplete="new-password" placeholder="Mínimo 6 caracteres">

            <label for="telefono">Teléfono</label>
            <input type="text" id="telefono" name="telefono" required autocomplete="off" placeholder="123-456-7890">

            <label for="direccion">Dirección</label>
            <textarea id="direccion" name="direccion" required autocomplete="off" placeholder="Calle Principal #123"></textarea>

            <label for="rol">Rol</label>
            <select id="rol" name="rol" required onchange="toggleVeterinarioFields()">
                <option value="">-- Selecciona un rol --</option>
                <option value="cliente" {% if rol == 'cliente' %}selected{% endif %}>Cliente</option>
    
            </select>

            <!-- Campos para veterinario -->
            <div id="veterinario-fields" class="veterinario-fields {% if rol == 'veterinario' %}mostrar{% endif %}">
                <label for="especialidad">Especialidad *</label>
                <input type="text" id="especialidad" name="especialidad" {% if rol == 'veterinario' %}required{% endif %} autocomplete="off" placeholder="Ej: Cirugía, Dermatología">
            </div>

            <button type="submit">
                <i class="fas fa-user-plus"></i> Registrarse
            </button>
        </form>

        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
    </div>

    <script>
        function toggleVeterinarioFields() {
            const rol = document.getElementById('rol').value;
            const fields = document.getElementById('veterinario-fields');
            if (rol === 'veterinario') {
                fields.classList.add('mostrar');
                document.getElementById('especialidad').required = true;
            } else {
                fields.classList.remove('mostrar');
                document.getElementById('especialidad').required = false;
            }
        }
    </script>
</body>
</html>
